<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈尼梯田 · 碳汇形成 · HCCS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a1a0d;font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;}
.scene-wrap{display:flex;width:100%;height:100vh;align-items:stretch;}
#svg-container{flex:1;min-width:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0a1a0d;}
#main-svg{width:100%;height:100%;display:block;}
#info-panel{
  width:310px;min-width:260px;flex-shrink:0;
  background:linear-gradient(160deg,#0c1f12 0%,#081509 100%);
  border-left:1px solid rgba(93,202,165,0.2);
  display:flex;flex-direction:column;padding:26px 20px 18px;
  color:#EAF3DE;overflow-y:auto;
}
.panel-logo{font-size:9px;letter-spacing:3px;color:rgba(93,202,165,0.55);text-transform:uppercase;margin-bottom:16px;}
.panel-title{font-size:17px;font-weight:700;color:#EAF3DE;margin-bottom:7px;line-height:1.35;}
.panel-sub{font-size:11.5px;color:rgba(234,243,222,0.52);line-height:1.75;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.stat-box{padding:9px 8px 7px;background:rgba(255,255,255,0.04);border-radius:9px;border:1px solid rgba(255,255,255,0.07);text-align:center;}
.stat-val{font-size:15px;font-weight:700;color:#5DCAA5;}
.stat-key{font-size:9.5px;color:rgba(234,243,222,0.48);margin-top:2px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag{padding:3px 9px;border-radius:20px;font-size:10.5px;background:rgba(93,202,165,0.1);border:0.5px solid rgba(93,202,165,0.32);color:#9de8cc;}
.hccs-box{background:rgba(93,202,165,0.07);border:1px solid rgba(93,202,165,0.22);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:rgba(234,243,222,0.72);line-height:1.7;}
.hccs-box strong{color:#5DCAA5;display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.hint-items{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.hint-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,0.04);cursor:pointer;border:1px solid rgba(255,255,255,0.06);transition:background 0.2s,border-color 0.2s;}
.hint-item:hover{background:rgba(255,255,255,0.09);}
.hint-item.hl{border-color:var(--hc,rgba(93,202,165,0.5));background:rgba(93,202,165,0.07);}
.hint-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hint-label{font-size:11.5px;color:rgba(255,255,255,0.72);}
.hint-sub{font-size:10px;color:rgba(255,255,255,0.38);margin-top:1px;}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-bottom:9px;}
.badge-dot{width:7px;height:7px;border-radius:50%;}
.tt-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-bottom:5px;}
#tooltip{position:fixed;pointer-events:none;z-index:999;background:rgba(8,22,12,0.95);border:1px solid rgba(93,202,165,0.42);border-radius:11px;padding:11px 15px;max-width:230px;color:#EAF3DE;font-size:12px;line-height:1.65;box-shadow:0 6px 28px rgba(0,0,0,0.6);transition:opacity 0.12s;opacity:0;}
#tooltip.show{opacity:1;}
#tooltip .tt-title{font-weight:700;font-size:13px;margin-bottom:3px;}
#tooltip .tt-body{color:rgba(234,243,222,0.65);}
.hz{outline:none;}
</style>
</head>

<script>
const ZONES = {
  forest: {
    color: "#5cb840",
    cat: "ECOSYSTEM · A轨核心",

    badgeBorder: "rgba(92,184,64,0.5)",

    desc: "哈尼梯田上层茂密森林是四素同构生态系统的顶端。森林通过光合作用年均固碳 4.28 万吨 CO₂，同时截留降雨并缓慢释放，形成可持续自然灌溉体系，被 UNESCO 称为梯田生命线。",
    hccs: "天然固碳量已接入 CCER 方法学，产生的碳信用面向控排企业（航空公司）开放认购，溢价资金直接注入 HCCA 专项账户（世界银行托管）。",
    hccsLabel: "A轨 · 资金生产模块",
    stats: [{v:"4.28万t",k:"年均固碳量"},{v:"82%",k:"流域覆盖率"},{v:">1400mm",k:"年均拦截降雨"},{v:"5000+",k:"植物物种"}],

  },
  water: {
    color: "#4a9ae0",
    cat: "HYDROLOGY · HPE传导介质",

    badgeColor: "rgba(74,154,224,0.15)",
    badgeBorder: "rgba(74,154,224,0.5)",
    title: "水系碳输送",
    tooltip: "自流灌溉系统将森林有机质\n垂直输送至每一级梯田",
    desc: "哈尼水系由天然溪流与数千条人工水渠构成，全程依靠重力无泵自流灌溉。水系在输送水分的同时，将有机碳和养分从森林传输至梯田与下游，形成碳循环通道。",
    hccs: "水系作为保护当量（HPE）的传导介质，水质稳定性直接挂钩 B 轨资源分配中的遗址保护绩效考核，影响 HCCA 资金拨付节点。",
    hccsLabel: "B轨 · 绩效传导介质",
    stats: [{v:"数千条",k:"灌溉水渠"},{v:"全重力",k:"无泵自流"},{v:"1200mm",k:"年均降雨量"},{v:"4条",k:"主要河流"}],
    tags: ["重力灌溉","HPE传导","有机碳输送","传统水利"]
  },
  land: {
    color: "#d4894a",
    cat: "AGRICULTURE · B轨积分载体",
    badge: "文化景观 & 碳中和示范区",
    badgeColor: "rgba(212,137,74,0.15)",
    badgeBorder: "rgba(212,137,74,0.5)",
    title: "梯田碳汇",
    tooltip: "土壤有机质 3.32%，稻-鱼-鸭\n共生系统（GIAHS认定）",
    desc: "连绵层级梯田是哈尼生态系统的核心碳库。水田湿地同时具备粮食生产、湿地固碳、调蓄洪水多重生态服务，核心产出：红米、淡水鱼、麻鸭，土壤有机质富集率高达 4.32%。",
    hccs: "基于 AI 遥感评估的濒危度与稀缺性，该区域获 HCCA 资金提取优先权。旅游碳税通过预约系统征收（故宫模式），资金 100% 回流保护账户。",
    hccsLabel: "B轨 · 遗产资源积分载体",
    stats: [{v:"4.28万t",k:"系统年固碳"},{v:"16603ha",k:"梯田总面积"},{v:"4.32%",k:"耕作层有机质"},{v:"195种",k:"地方水稻品种"}],
    tags: ["GIAHS遗产","湿地碳汇","旅游碳税","稻鱼鸭共生"]
  }
};

let activeZone = null;
const tooltip = document.getElementById("tooltip");
const panelDefault = document.getElementById("panel-default");
const panelDetail = document.getElementById("panel-detail");

const ZONE_IDS = ["forest", "land", "water"];

function setFilter(active) {
  ZONE_IDS.forEach(id => {
    const g = document.getElementById(id);
    if (!g) return;
    if (!active) { g.style.filter = ""; g.style.cursor = "default"; return; }
    g.style.filter = id === active
      ? "brightness(1.4) saturate(1.25) drop-shadow(0 0 8px rgba(255,255,255,0.3))"
      : "brightness(0.5) saturate(0.4)";
  });
}

function showTooltip(zone, e) {
  const z = ZONES[zone];
  document.querySelector(".tt-badge").textContent = z.badge;
  document.querySelector(".tt-badge").style.cssText =
    `background:${z.badgeColor};border:0.5px solid ${z.badgeBorder};color:${z.color};display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-bottom:5px;`;
  tooltip.querySelector(".tt-title").textContent = z.title;
  tooltip.querySelector(".tt-body").textContent = z.tooltip;
  tooltip.classList.add("show");
  moveTooltip(e);
}

function moveTooltip(e) {
  const tx = Math.min(e.clientX + 18, window.innerWidth - 260);
  const ty = Math.max(e.clientY - 14, 10);
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
}

ZONE_IDS.forEach(zone => {
  const g = document.getElementById(zone);
  if (!g) return;
  g.style.cursor = "pointer";
  g.addEventListener("mouseenter", e => {
    if (!activeZone) setFilter(zone);
    showTooltip(zone, e);
  });
  g.addEventListener("mousemove", e => moveTooltip(e));
  g.addEventListener("mouseleave", () => {
    tooltip.classList.remove("show");
    if (!activeZone) setFilter(null);
  });
  g.addEventListener("click", e => {
    e.stopPropagation();
    activeZone = (activeZone === zone) ? null : zone;
    setFilter(activeZone);
    updatePanel();
  });
});

// Click outside SVG groups resets
document.getElementById("main-svg").addEventListener("click", () => {
  activeZone = null;
  setFilter(null);
  updatePanel();
});

function updatePanel() {
  if (!activeZone) {
    panelDefault.style.display = "";
    panelDetail.style.display = "none";
    document.querySelectorAll(".hint-item").forEach(el => el.classList.remove("hl"));
    return;
  }
  const z = ZONES[activeZone];
  panelDefault.style.display = "none";
  panelDetail.style.display = "flex";
  document.getElementById("info-cat-dot").style.background = z.color;
  document.getElementById("info-cat").textContent = z.cat;
  const titleEl = document.getElementById("info-title");
  titleEl.textContent = z.title;
  titleEl.style.color = z.color;
  document.getElementById("info-badge").textContent = z.badge;
  document.getElementById("info-badge").style.cssText =
    `background:${z.badgeColor};border:0.5px solid ${z.badgeBorder};color:${z.color};display:inline-block;padding:3px 10px;border-radius:12px;font-size:10.5px;font-weight:600;margin-bottom:8px;`;
  document.getElementById("info-desc").textContent = z.desc;
  document.getElementById("info-hccs-label").textContent = z.hccsLabel;
  document.getElementById("info-hccs-body").textContent = z.hccs;
  document.getElementById("info-stats").innerHTML = z.stats.map(s =>
    `<div class="stat-box"><div class="stat-val" style="color:${z.color}">${s.v}</div><div class="stat-key">${s.k}</div></div>`).join("");
  document.getElementById("info-tags").innerHTML = z.tags.map(t =>
    `<span class="tag">${t}</span>`).join("");
  document.querySelectorAll(".hint-item").forEach(el => {
    const on = el.dataset.zone === activeZone;
    el.classList.toggle("hl", on);
    if (on) el.style.setProperty("--hc", z.color + "70");
  });
}
</script>
