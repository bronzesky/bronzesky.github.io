<title>哈尼梯田 · 四素同构生态系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1a2535;font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;}
.scene-wrap{display:flex;width:100%;height:100vh;align-items:stretch;}
#svg-scene{flex:1;min-width:0;}
#info-panel{width:300px;min-width:260px;flex-shrink:0;background:linear-gradient(160deg,#17261a 0%,#0d1f14 100%);border-left:1px solid rgba(93,202,165,0.18);display:flex;flex-direction:column;padding:28px 22px 22px;color:#fff;position:relative;overflow:hidden;}
#info-panel::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(93,202,165,0.12) 0%,transparent 70%);pointer-events:none;}
.panel-logo{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:26px;}
.panel-default{display:flex;flex-direction:column;gap:11px;}
.panel-title-main{font-size:18px;font-weight:700;line-height:1.3;color:#EAF3DE;margin-bottom:2px;}
.panel-sub{font-size:12px;color:rgba(234,243,222,0.5);line-height:1.7;}
.hint-items{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.hint-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,0.04);cursor:pointer;transition:background 0.2s,border-color 0.2s;border:1px solid rgba(255,255,255,0.06);}
.hint-item:hover{background:rgba(255,255,255,0.09);}
.hint-item.hl{border-color:var(--hc,rgba(93,202,165,0.5));background:rgba(93,202,165,0.08);}
.hint-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hint-label{font-size:12px;color:rgba(255,255,255,0.75);}
.panel-detail{display:none;flex-direction:column;}
.panel-detail.show{display:flex;}
.detail-badge{display:inline-flex;align-items:center;gap:7px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:13px;}
.detail-badge-dot{width:7px;height:7px;border-radius:50%;}
.detail-title{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:9px;}
.detail-desc{font-size:12px;line-height:1.8;color:rgba(255,255,255,0.62);margin-bottom:16px;}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-box{padding:10px;border-radius:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);}
.stat-val{font-size:16px;font-weight:700;margin-bottom:2px;}
.stat-key{font-size:10px;color:rgba(255,255,255,0.4);}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.tag{padding:3px 10px;border-radius:20px;font-size:10px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.09);}
.back-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.55);padding:9px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:background 0.2s;width:fit-content;font-family:inherit;}
.back-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
.eco-flow{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);}
.flow-title{font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:1px;margin-bottom:7px;}
.flow-row{display:flex;align-items:center;gap:5px;margin-top:5px;}
.flow-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.flow-arrow{font-size:9px;color:rgba(255,255,255,0.18);}
.flow-lbl{font-size:10px;color:rgba(255,255,255,0.25);}
</style>
</head>

let current = null;

function selectZone(zone) {
  if (current === zone) { clearZone(); return; }
  current = zone;
  const z = ZONES[zone];

  // SVG zone highlighting
  ["forest","village","terraces","river"].forEach(id => {
    const el = document.getElementById("zone-" + id);
    if (!el) return;
    el.style.filter = (id === zone) ? "url(#bright)" : "url(#dim)";
    el.style.transition = "filter 0.35s";
  });

  // Panel
  document.getElementById("panel-default").style.display = "none";
  const det = document.getElementById("panel-detail");
  det.classList.add("show");

  document.getElementById("detail-dot").style.background = z.color;
  document.getElementById("detail-cat").textContent = z.cat;
  document.getElementById("detail-title").textContent = z.title;
  document.getElementById("detail-title").style.color = z.color;
  document.getElementById("detail-desc").textContent = z.desc;

  const statsEl = document.getElementById("detail-stats");
  statsEl.innerHTML = z.stats.map(s =>
    `<div class="stat-box"><div class="stat-val" style="color:${z.color}">${s.v}</div><div class="stat-key">${s.k}</div></div>`
  ).join("");

  const tagsEl = document.getElementById("detail-tags");
  tagsEl.innerHTML = z.tags.map(t => `<span class="tag">${t}</span>`).join("");

  // Highlight panel hint
  document.querySelectorAll(".hint-item").forEach(el => el.classList.remove("hl"));
}

function clearZone() {
  current = null;
  ["forest","village","terraces","river"].forEach(id => {
    const el = document.getElementById("zone-" + id);
    if (el) { el.style.filter = ""; }
  });
  document.getElementById("panel-default").style.display = "";
  document.getElementById("panel-detail").classList.remove("show");
}

// Wire up SVG zones
["forest","village","terraces","river"].forEach(id => {
  const el = document.getElementById("zone-" + id);
  if (el) el.addEventListener("click", () => selectZone(id));
});
</script>
